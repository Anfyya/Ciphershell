# CipherShell production configuration example
# L1-L5 is only a preset. Explicit module switches below take precedence.

[global]
protection_level = 4
strip_debug_info = true
strip_rich_header = true
strip_timestamps = true
randomize_section_names = true

[vm]
enabled = true
strength = 90
target_functions = ["license_*", "verify_*"]
target_rvas = []
register_count = 24
stack_size = 0x20000
opcode_randomization = true
handler_mutation = true
bytecode_encryption = true
native_body_policy = "destroy"
x86_call_abi = "auto"
embed_junk_handlers = true
simd_bridge = true
x87_bridge = true

[string_encryption]
enabled = true
strength = 80
mode = "startup"
ascii = true
utf16 = true
resources = false
clear_after_use = false

[import_protection]
enabled = true
strength = 60

[section_encryption]
enabled = false
strength = 70
mode = "startup"

[control_flow]
enabled = false
strength = 60

[control_flow.flattening]
enabled = false
strength = 60
target_functions = ["license_*"]

[control_flow.bogus]
enabled = false
strength = 50

[anti_debug]
timing_checks = true
hardware_bp_detection = true
software_bp_detection = true
memory_integrity = true
debugger_window_scan = false
parent_process_check = true
thread_hiding = true
kernel_debugger_check = true

[anti_dump]
erase_pe_header = true
section_permission_guard = true
nanomite_patches = true

[performance]
auto_hotspot_analysis = true
max_vm_overhead_ratio = 15.0
