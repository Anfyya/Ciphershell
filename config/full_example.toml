# CipherShell production configuration example
# L1-L5 is only a preset. Explicit module switches below take precedence.

[global]
protection_level = 4
strip_debug_info = true
strip_rich_header = true
strip_timestamps = true
randomize_section_names = true

[vm]
enabled = true
strength = 90
target_functions = ["license_*", "verify_*"]
target_rvas = []
register_count = 24
stack_size = 0x20000
opcode_randomization = true
handler_mutation = true
bytecode_encryption = true
native_body_policy = "destroy"
x86_call_abi = "auto"
embed_junk_handlers = true
simd_bridge = true
x87_bridge = true
# VM Variant Group：0 = 按候选函数数量自适应决定组数，>=1 为显式固定组数。
# groupId=0（或单 Group 场景）与不启用这套机制时逐位一致。
variant_group_count = 0
variant_group_max = 4
variant_group_functions_per_group = 4

[string_encryption]
# Fail-closed: 弱加密（未认证算法 + 可恢复密钥）。显式开启会被 CapabilityChecker fatal 拒绝。
enabled = false
strength = 80
mode = "startup"
ascii = true
utf16 = true
resources = false
clear_after_use = false

[import_protection]
# Fail-closed: 保留真实 IAT，未改写 callsite。显式开启会被 CapabilityChecker fatal 拒绝。
enabled = false
strength = 60

[section_encryption]
enabled = false
strength = 70
mode = "startup"

[control_flow]
enabled = false
strength = 60

[control_flow.flattening]
enabled = false
strength = 60
target_functions = ["license_*"]

[control_flow.bogus]
enabled = false
strength = 50

# CipherShell Plus：anti_debug/anti_dump 尚未被任何 transform 消费，打包时任意
# 一项 true 都会被 main.cpp fail-closed 拒绝。默认必须保持 false，正式实现前
# 不要打开。
[anti_debug]
timing_checks = false
hardware_bp_detection = false
software_bp_detection = false
memory_integrity = false
debugger_window_scan = false
parent_process_check = false
thread_hiding = false
kernel_debugger_check = false

[anti_dump]
erase_pe_header = false
section_permission_guard = false
nanomite_patches = false

[performance]
auto_hotspot_analysis = true
max_vm_overhead_ratio = 15.0
