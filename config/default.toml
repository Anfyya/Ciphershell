# CipherShell production configuration

[global]
protection_level = 3
strip_debug_info = true
strip_rich_header = true
strip_timestamps = true
randomize_section_names = true

[vm]
enabled = false
strength = 80
target_functions = []
target_rvas = []
register_count = 24
stack_size = 0x20000
opcode_randomization = true
handler_mutation = true
bytecode_encryption = true
native_body_policy = "destroy"
x86_call_abi = "auto"
embed_junk_handlers = true
simd_bridge = true
x87_bridge = true

[string_encryption]
enabled = true
strength = 60
mode = "startup"
ascii = true
utf16 = true
resources = false
clear_after_use = false

[import_protection]
enabled = true
strength = 50

[section_encryption]
enabled = true
strength = 58
mode = "startup"

[control_flow]
enabled = true
strength = 55

[control_flow.flattening]
enabled = true
strength = 55
target_functions = []

[control_flow.bogus]
enabled = true
strength = 50

[anti_debug]
timing_checks = true
hardware_bp_detection = true
software_bp_detection = true
memory_integrity = true
debugger_window_scan = false
parent_process_check = true
thread_hiding = true
kernel_debugger_check = true

[anti_dump]
erase_pe_header = true
section_permission_guard = true
nanomite_patches = true

[performance]
auto_hotspot_analysis = true
max_vm_overhead_ratio = 15.0
