# CipherShell production configuration

[global]
protection_level = 3
strip_debug_info = true
strip_rich_header = true
strip_timestamps = true
randomize_section_names = true

[vm]
enabled = false
strength = 80
target_functions = []
target_rvas = []
register_count = 24
stack_size = 0x20000
opcode_randomization = true
handler_mutation = true
bytecode_encryption = true
native_body_policy = "destroy"
x86_call_abi = "auto"
embed_junk_handlers = true
simd_bridge = true
x87_bridge = true
variant_group_count = 0
variant_group_max = 4
variant_group_functions_per_group = 4

[string_encryption]
# Fail-closed: 弱加密（未认证算法 + 可恢复密钥），默认关闭。
# 显式 enabled = true 会在 CapabilityChecker 阶段（任何 PE 修改之前）被 fatal 拒绝。
enabled = false
strength = 60
mode = "startup"
ascii = true
utf16 = true
resources = false
clear_after_use = false

[import_protection]
# Fail-closed: 仅追加假导入并保留真实 IAT，未改写 callsite。默认关闭。
# 显式 enabled = true 会在 CapabilityChecker 阶段被 fatal 拒绝。
enabled = false
strength = 50

[section_encryption]
# Fail-closed: 弱加密（未认证算法 + 可恢复密钥），默认关闭。
# 显式 enabled = true 会在 CapabilityChecker 阶段被 fatal 拒绝。
enabled = false
strength = 58
mode = "startup"

[control_flow]
# flattening 是可独立使用的本地 CFG 保护；bogus flow 仍为 fail-closed。
# 总开关与下面的子开关必须一致。
enabled = false
strength = 55

[control_flow.flattening]
# 真实块体 + 编码状态分发器；不需要 VM。显式 target 不安全时 fail-closed。
enabled = false
strength = 55
target_functions = []

[control_flow.bogus]
enabled = false
strength = 50

# CipherShell Plus：anti_debug/anti_dump 尚未被任何 transform 消费，main.cpp
# 会对这里任何一项 true 都 fail-closed 拒绝出包，而不是静默打出一个反调试/反
# Dump 其实完全没生效的产物。默认必须全部保持 false；正式实现前不要打开。
[anti_debug]
timing_checks = false
hardware_bp_detection = false
software_bp_detection = false
memory_integrity = false
debugger_window_scan = false
parent_process_check = false
thread_hiding = false
kernel_debugger_check = false

[anti_dump]
erase_pe_header = false
section_permission_guard = false
nanomite_patches = false

[performance]
auto_hotspot_analysis = true
max_vm_overhead_ratio = 15.0
