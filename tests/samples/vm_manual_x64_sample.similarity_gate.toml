# Config for tests/scripts/vm_per_build_similarity_gate.py.
#
# Identical to config/default.toml except [vm].enabled and
# [vm].variant_group_count. Everything else (including target_functions
# staying empty, so hotspot-based auto-selection decides which of the
# sample's functions get virtualized, same as protection_level>=4's preset)
# is left at the production default -- this file only needs to force a
# single VM Variant Group so both builds land their handler bodies at
# vm_group=0 and are directly comparable, instead of the default adaptive
# group count scattering the same candidate function across a different
# group id on each independently-seeded build.

[global]
protection_level = 4
strip_debug_info = true
strip_rich_header = true
strip_timestamps = true
randomize_section_names = true

[vm]
enabled = true
strength = 80
target_functions = []
target_rvas = []
register_count = 24
stack_size = 0x20000
opcode_randomization = true
handler_mutation = true
bytecode_encryption = true
native_body_policy = "destroy"
x86_call_abi = "auto"
embed_junk_handlers = true
simd_bridge = true
x87_bridge = true
variant_group_count = 1
variant_group_max = 4
variant_group_functions_per_group = 4

[string_encryption]
enabled = false
strength = 60
mode = "startup"
ascii = true
utf16 = true
resources = false
clear_after_use = false

[import_protection]
enabled = false
strength = 50

[section_encryption]
enabled = false
strength = 58
mode = "startup"

[control_flow]
enabled = false
strength = 55

[control_flow.flattening]
enabled = false
strength = 55
target_functions = []

[control_flow.bogus]
enabled = false
strength = 50

[anti_debug]
timing_checks = true
hardware_bp_detection = true
software_bp_detection = true
memory_integrity = true
debugger_window_scan = false
parent_process_check = true
thread_hiding = true
kernel_debugger_check = true

[anti_dump]
erase_pe_header = true
section_permission_guard = true
nanomite_patches = true

[performance]
auto_hotspot_analysis = true
max_vm_overhead_ratio = 15.0
